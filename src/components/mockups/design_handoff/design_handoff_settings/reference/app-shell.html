<style>
  :root {
    --bg: #FAFAFA;
    --surface: #FFFFFF;
    --surface-tint: #F9FAFB;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;
    --text-1: #0F172A;
    --text-2: #475569;
    --text-3: #94A3B8;
    --accent: #1E40AF;
    --accent-hover: #1D4ED8;
    --accent-tint: rgba(30, 64, 175, 0.06);
    --accent-ring: rgba(30, 64, 175, 0.30);
    --success: #16A34A;
    --success-bg: #DCFCE7;
    --success-text: #166534;
    --warning: #D97706;
    --warning-bg: #FEF3C7;
    --warning-text: #92400E;
    --danger: #DC2626;
    --danger-bg: #FEE2E2;
    --danger-text: #991B1B;
    --info-bg: #DBEAFE;
    --info-text: #1E40AF;
    --tooltip-bg: #0F172A;

    /* Tweak-controlled — defaults match the "standard" + "outlined" preset */
    --btn-h-sm: 28px;
    --btn-h: 36px;
    --btn-h-lg: 40px;
    --chip-h: 32px;
    --cell-pad-y: 12px;
    --cell-pad-x: 14px;
    --th-pad-y: 10px;
    --cell-fs: 13px;
    --sidebar-item-h: 32px;
    --card-bg: var(--surface);
    --card-border: 1px solid var(--border);
    --th-bg: var(--surface-tint);
  }
  html[data-theme="dark"] {
    --bg: #0A0A0A;
    --surface: #141414;
    --surface-tint: #1A1A1A;
    --border: #262626;
    --border-strong: #404040;
    --text-1: #FAFAFA;
    --text-2: #A3A3A3;
    --text-3: #737373;
    --accent: #3B82F6;
    --accent-hover: #60A5FA;
    --accent-tint: rgba(59, 130, 246, 0.10);
    --accent-ring: rgba(59, 130, 246, 0.35);
    --success: #22C55E;
    --success-bg: rgba(34, 197, 94, 0.12);
    --success-text: #4ADE80;
    --warning: #F59E0B;
    --warning-bg: rgba(245, 158, 11, 0.12);
    --warning-text: #FBBF24;
    --danger: #EF4444;
    --danger-bg: rgba(239, 68, 68, 0.12);
    --danger-text: #F87171;
    --info-bg: rgba(59, 130, 246, 0.12);
    --info-text: #60A5FA;
    --tooltip-bg: #262626;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--text-1);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-ligatures: none; }
  button { font-family: inherit; font-size: inherit; font-weight: 400; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; color: var(--text-1); }
  ::placeholder { color: var(--text-3); }
  :focus-visible { outline: 2px solid var(--accent-ring); outline-offset: 1px; border-radius: 4px; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  /* Skeleton pulse */
  @keyframes skelPulse {
    0%, 100% { background-color: var(--surface-tint); }
    50% { background-color: var(--border); }
  }
  .skeleton { animation: skelPulse 1.5s ease-in-out infinite; border-radius: 4px; }
</style>
</head>
